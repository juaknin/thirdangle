<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuner</title>
    <style>
        /* Add your CSS styles here */
    </style>
</head>
<body>
    <canvas id="tunerCanvas"></canvas>
    <script>
        // Touch event support for mobile devices
        const canvas = document.getElementById('tunerCanvas');
        const context = canvas.getContext('2d');

        // Improved canvas context handling for iOS Safari
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw(); // Redraw after resize
        }

        // Better ripple effect positioning for touch events
        canvas.addEventListener('touchstart', (event) => {
            const touch = event.touches[0];
            const x = touch.clientX;
            const y = touch.clientY;
            drawRipple(x, y);
        });

        // Enhanced AudioContext state management
        let audioContext = new (window.AudioContext || window.webkitAudioContext)();
        document.addEventListener('click', () => {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });

        function drawRipple(x, y) {
            context.fillStyle = 'rgba(255, 255, 255, 0.8)';
            context.beginPath();
            context.arc(x, y, 20, 0, Math.PI * 2, true);
            context.fill();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas(); // Initial resize
    </script>
</body>
</html>
