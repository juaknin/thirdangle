<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesheet</title>

  <!--
  ════════════════════════════════════════════════════════════════
  FIREBASE SETUP — one-time, takes about 10 minutes
  ════════════════════════════════════════════════════════════════

  1. Go to https://console.firebase.google.com → sign in with Google
  2. Click "Get started" → "Create a project"
     - Name it anything (e.g. "timesheet")
     - Disable Google Analytics (not needed) → Create project
  3. In the left sidebar: Build → Realtime Database → Create Database
     - Choose any region (us-central1 is fine)
     - Select "Start in test mode" → Enable
  4. Back in the left sidebar: click the gear icon → Project Settings
     - Scroll to "Your apps" → click the </> (Web) icon
     - Register app with any nickname → you'll see a firebaseConfig object
  5. Copy the values from that config into the firebaseConfig block below
  6. Open this file in a browser — done!

  To use on multiple devices: just open the same file on each device.
  All data syncs through Firebase automatically.
  ════════════════════════════════════════════════════════════════
  -->

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #0f0f0e;
      --bg2:       #181816;
      --bg3:       #222220;
      --border:    #2e2e2b;
      --amber:     #f59e0b;
      --amber-dim: #b37308;
      --text:      #e4e2dc;
      --muted:     #6b6b65;
      --red:       #ef4444;
      --green:     #4ade80;
      --r:         3px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 24px 20px 48px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: .1em; color: var(--amber); }

    .header-right { text-align: right; }
    #current-date { font-size: .65rem; color: var(--muted); letter-spacing: .06em; margin-bottom: 2px; }
    #fb-status    { font-size: .58rem; letter-spacing: .06em; color: var(--muted); }
    #fb-status.ok  { color: var(--green); }
    #fb-status.err { color: var(--red); }

    /* ── Project grid ───────────────────────────────── */
    .projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 32px;
    }
    @media (max-width: 480px) { .projects { grid-template-columns: 1fr; } }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 16px 14px;
      transition: border-color .2s;
    }
    .card.running { border-color: var(--amber); }

    /* Project name row */
    .card-name {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .dot {
      flex-shrink: 0;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: background .2s, box-shadow .2s;
    }
    .card.running .dot {
      background: var(--amber);
      box-shadow: 0 0 7px var(--amber);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .name-text {
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-name:hover .name-text { color: var(--text); }

    .edit-hint { font-size: .55rem; color: var(--border); }
    .card-name:hover .edit-hint { color: var(--muted); }

    .name-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--amber);
      color: var(--text);
      font-family: inherit;
      font-size: .65rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      width: 100%;
      outline: none;
      padding-bottom: 1px;
    }

    /* Timer */
    .card-timer {
      font-size: 2.6rem;
      font-weight: 600;
      letter-spacing: .03em;
      line-height: 1;
      margin-bottom: 14px;
      transition: color .2s;
    }
    .card.running .card-timer { color: var(--amber); }

    /* Footer */
    .card-footer { display: flex; justify-content: space-between; align-items: center; }

    .today-label { font-size: .6rem; color: var(--muted); }

    .btn-toggle {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: .6rem;
      letter-spacing: .1em;
      padding: 5px 13px;
      border-radius: var(--r);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }
    .btn-toggle:hover { border-color: var(--muted); color: var(--text); }
    .card.running .btn-toggle {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(245,158,11,.07);
    }

    /* ── Section label ──────────────────────────────── */
    .section-label {
      font-size: .58rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Sessions table ─────────────────────────────── */
    .sessions-wrap { margin-bottom: 28px; }

    .tbl { width: 100%; border-collapse: collapse; font-size: .68rem; }

    .tbl th {
      text-align: left;
      font-weight: 400;
      font-size: .55rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 5px 8px;
    }
    .tbl td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--bg3);
    }
    .tbl tr:hover td { background: var(--bg2); }

    .tbl .del {
      background: none; border: none;
      color: var(--border); cursor: pointer;
      font-size: .7rem; padding: 1px 4px;
      transition: color .15s;
    }
    .tbl .del:hover { color: var(--red); }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      font-size: .65rem;
      padding: 28px;
    }

    /* ── Export panel ───────────────────────────────── */
    .export-panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
    }

    .export-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }

    .sel-month {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: .68rem;
      padding: 6px 10px;
      border-radius: var(--r);
      outline: none; cursor: pointer;
    }

    .btn-export {
      background: var(--amber);
      border: none;
      color: #111;
      font-family: inherit;
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 7px 18px;
      border-radius: var(--r);
      cursor: pointer;
      transition: background .15s;
    }
    .btn-export:hover { background: var(--amber-dim); }

    .export-totals {
      font-size: .63rem;
      color: var(--muted);
      line-height: 1.8;
    }
    .export-totals span { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">TIMESHEET</div>
  <div class="header-right">
    <div id="current-date"></div>
    <div id="fb-status">connecting…</div>
  </div>
</header>

<div class="projects" id="projects-grid"></div>

<div class="sessions-wrap">
  <div class="section-label">Recent sessions</div>
  <table class="tbl">
    <thead>
      <tr>
        <th>Date</th><th>Project</th><th>Start</th><th>End</th><th>Duration</th><th></th>
      </tr>
    </thead>
    <tbody id="sessions-body">
      <tr><td colspan="6" class="empty-msg">No sessions yet</td></tr>
    </tbody>
  </table>
</div>

<div class="export-panel">
  <div class="section-label">Export</div>
  <div class="export-row">
    <select class="sel-month" id="month-sel"></select>
    <button class="btn-export" onclick="exportCSV()">↓ Export CSV</button>
  </div>
  <div class="export-totals" id="export-totals">—</div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG — paste your Firebase values here
// ════════════════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDIKCIMH4qnW3NuqwFmz8bAgJ5HdL1GyEc",
  authDomain: "timetracking-6aafb.firebaseapp.com",
  databaseURL: "https://timetracking-6aafb-default-rtdb.firebaseio.com",
  projectId: "timetracking-6aafb",
  storageBucket: "timetracking-6aafb.firebasestorage.app",
  messagingSenderId: "181425664766",
  appId: "1:181425664766:web:e85a24badfbbd259ddabaf"
};
// ════════════════════════════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── Local state ──────────────────────────────────────────────────
const DEFAULT_PROJECTS = {
  "0": { name: "Project 1" },
  "1": { name: "Project 2" },
  "2": { name: "Project 3" },
  "3": { name: "Project 4" }
};

let projects = { ...DEFAULT_PROJECTS };
let active   = {};   // { "0": startTimestampMs, ... }
let sessions = {};   // { firebaseKey: { projectId, start, end, duration } }
let tickTimer = null;

// ── Helpers ──────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');

function msToHMS(ms) {
  const s = Math.floor(ms / 1000);
  return `${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`;
}
function secToHMS(s) {
  return `${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`;
}
function secToH(s)  { return (s/3600).toFixed(2) + ' h'; }
function fmtDate(ts){ return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function fmtHM(ts)  { return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function monthKey(ts){ const d=new Date(ts); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }
function monthLabel(k){ const [y,m]=k.split('-'); return new Date(y,m-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }

// ── Header date ──────────────────────────────────────────────────
function updateDate() {
  document.getElementById('current-date').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

// ── Today total per project ──────────────────────────────────────
function todayTotal(pid) {
  const midnight = new Date(); midnight.setHours(0,0,0,0);
  let t = 0;
  Object.values(sessions).forEach(s => {
    if (String(s.projectId) === String(pid) && s.start >= midnight.getTime())
      t += s.duration || 0;
  });
  if (active[pid] && active[pid] >= midnight.getTime())
    t += Math.floor((Date.now() - active[pid]) / 1000);
  return t;
}

// ── Render projects ──────────────────────────────────────────────
function renderProjects() {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';
  ['0','1','2','3'].forEach(pid => {
    const proj = projects[pid] || { name: `Project ${+pid+1}` };
    const running = !!active[pid];
    const card = document.createElement('div');
    card.className = `card${running ? ' running' : ''}`;
    card.id = `card-${pid}`;
    card.innerHTML = `
      <div class="card-name" onclick="editName('${pid}')">
        <div class="dot"></div>
        <div class="name-text">${escHtml(proj.name)}</div>
        <div class="edit-hint">✎</div>
      </div>
      <div class="card-timer" id="timer-${pid}">00:00:00</div>
      <div class="card-footer">
        <div class="today-label" id="today-${pid}">Today: ${secToH(todayTotal(pid))}</div>
        <button class="btn-toggle" onclick="toggle('${pid}')">
          ${running ? '■ STOP' : '▶ START'}
        </button>
      </div>`;
    grid.appendChild(card);
  });
  updateTimers();
}

// ── Inline name editing ──────────────────────────────────────────
function editName(pid) {
  const nameDiv = document.querySelector(`#card-${pid} .card-name`);
  const current = projects[pid]?.name || '';
  nameDiv.innerHTML = `<input class="name-input" type="text" value="${escHtml(current)}" maxlength="30">`;
  const inp = nameDiv.querySelector('input');
  inp.focus(); inp.select();
  const save = () => {
    const v = inp.value.trim() || `Project ${+pid+1}`;
    db.ref(`projects/${pid}/name`).set(v);
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') renderProjects(); });
}

// ── Toggle timer ─────────────────────────────────────────────────
function toggle(pid) {
  if (active[pid]) {
    const start = active[pid];
    const end   = Date.now();
    const dur   = Math.floor((end - start) / 1000);
    if (dur < 5) { db.ref(`active/${pid}`).remove(); return; } // ignore <5s taps
    db.ref('sessions').push({ projectId: pid, start, end, duration: dur });
    db.ref(`active/${pid}`).remove();
  } else {
    db.ref(`active/${pid}`).set(Date.now());
  }
}

// ── Tick every second ────────────────────────────────────────────
function startTick() {
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(updateTimers, 1000);
}

function updateTimers() {
  ['0','1','2','3'].forEach(pid => {
    const el = document.getElementById(`timer-${pid}`);
    const td = document.getElementById(`today-${pid}`);
    if (!el) return;
    el.textContent = active[pid] ? msToHMS(Date.now() - active[pid]) : '00:00:00';
    if (td) td.textContent = `Today: ${secToH(todayTotal(pid))}`;
  });
}

// ── Render sessions log ──────────────────────────────────────────
function renderSessions() {
  const tbody = document.getElementById('sessions-body');
  const keys  = Object.keys(sessions).sort((a,b) => sessions[b].start - sessions[a].start);
  if (!keys.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No sessions yet</td></tr>';
    return;
  }
  tbody.innerHTML = keys.slice(0,60).map(k => {
    const s = sessions[k];
    const name = projects[s.projectId]?.name || `Project ${+s.projectId+1}`;
    return `<tr>
      <td>${fmtDate(s.start)}</td>
      <td>${escHtml(name)}</td>
      <td>${fmtHM(s.start)}</td>
      <td>${fmtHM(s.end)}</td>
      <td>${secToHMS(s.duration)}</td>
      <td><button class="del" onclick="delSession('${k}')">✕</button></td>
    </tr>`;
  }).join('');
}

function delSession(k) {
  if (confirm('Delete this session?')) db.ref(`sessions/${k}`).remove();
}

// ── Month select & export totals ─────────────────────────────────
function populateMonths() {
  const sel = document.getElementById('month-sel');
  const cur = sel.value;
  const months = new Set([monthKey(Date.now())]);
  Object.values(sessions).forEach(s => months.add(monthKey(s.start)));
  const sorted = [...months].sort().reverse();
  sel.innerHTML = sorted.map(m => `<option value="${m}">${monthLabel(m)}</option>`).join('');
  if (cur && months.has(cur)) sel.value = cur;
  updateExportTotals();
}

function updateExportTotals() {
  const m = document.getElementById('month-sel').value;
  if (!m) return;
  const [y,mo] = m.split('-');
  const t0 = new Date(+y, +mo-1, 1).getTime();
  const t1 = new Date(+y, +mo,   1).getTime();
  const totals = {};
  Object.values(sessions).forEach(s => {
    if (s.start >= t0 && s.start < t1)
      totals[s.projectId] = (totals[s.projectId] || 0) + (s.duration || 0);
  });
  const lines = Object.entries(totals).map(([pid,sec]) =>
    `${escHtml(projects[pid]?.name || `Project ${+pid+1}`)}: <span>${secToH(sec)}</span>`
  );
  const grandTotal = Object.values(totals).reduce((a,b)=>a+b,0);
  lines.push(`Total: <span>${secToH(grandTotal)}</span>`);
  document.getElementById('export-totals').innerHTML = lines.join('<br>') || '—';
}

// ── Export CSV ───────────────────────────────────────────────────
function exportCSV() {
  const m = document.getElementById('month-sel').value;
  const [y,mo] = m.split('-');
  const t0 = new Date(+y, +mo-1, 1).getTime();
  const t1 = new Date(+y, +mo,   1).getTime();

  const rows = [['Date','Project','Start','End','Duration (hh:mm:ss)','Hours']];
  const keys = Object.keys(sessions).sort((a,b) => sessions[a].start - sessions[b].start);
  const totals = {};

  keys.forEach(k => {
    const s = sessions[k];
    if (s.start >= t0 && s.start < t1) {
      const name = projects[s.projectId]?.name || `Project ${+s.projectId+1}`;
      const h = (s.duration/3600).toFixed(4);
      rows.push([fmtDate(s.start), name, fmtHM(s.start), fmtHM(s.end), secToHMS(s.duration), h]);
      totals[name] = (totals[name] || 0) + s.duration;
    }
  });

  rows.push([]);
  rows.push(['SUMMARY','','','','','']);
  Object.entries(totals).forEach(([name,sec]) => rows.push(['',name,'','','',( sec/3600).toFixed(4)]));
  rows.push(['','TOTAL','','','', (Object.values(totals).reduce((a,b)=>a+b,0)/3600).toFixed(4)]);

  const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {href:url, download:`timesheet-${m}.csv`});
  a.click();
  URL.revokeObjectURL(url);
}

// ── Utility ──────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Firebase listeners ───────────────────────────────────────────
function init() {
  updateDate();
  setInterval(updateDate, 60000);

  // Connection indicator
  db.ref('.info/connected').on('value', snap => {
    const el = document.getElementById('fb-status');
    el.textContent = snap.val() ? '● connected' : '○ offline';
    el.className   = snap.val() ? 'ok' : 'err';
  });

  // Bootstrap projects if first run
  db.ref('projects').once('value', snap => {
    if (!snap.val()) db.ref('projects').set(DEFAULT_PROJECTS);
  });

  // Live listeners
  db.ref('projects').on('value', snap => {
    projects = snap.val() || DEFAULT_PROJECTS;
    renderProjects();
    renderSessions();
    updateExportTotals();
  });

  db.ref('active').on('value', snap => {
    active = snap.val() || {};
    renderProjects();
  });

  db.ref('sessions').on('value', snap => {
    sessions = snap.val() || {};
    renderSessions();
    populateMonths();
  });

  document.getElementById('month-sel').addEventListener('change', updateExportTotals);
  startTick();
}

init();
</script>
</body>
</html>
